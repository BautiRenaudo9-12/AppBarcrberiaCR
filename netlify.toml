[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Proxy "first-party" del handler de Firebase Auth para que signInWithRedirect
# funcione en este dominio de Netlify (authDomain apunta acá, no a firebaseapp.com).
# Debe ir ANTES del catch-all SPA.
[[redirects]]
  from = "/__/auth/*"
  to = "https://react-appbarberiacr.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__/firebase/*"
  to = "https://react-appbarberiacr.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"

# Headers de seguridad. Estaban en el bloque `hosting` de firebase.json, que Netlify no lee,
# así que desde la migración la app se servía sin ninguno.
#
# X-Frame-Options va en SAMEORIGIN y no en DENY (como estaba en firebase.json) a propósito:
# el login con Google por redirect —el camino de mobile y PWA, ver src/lib/authEnv.ts— usa un
# iframe en /__/auth/, que acá es un proxy de nuestro propio dominio. Con DENY el navegador
# bloquearía ese iframe y el login quedaría roto. En Firebase Hosting no pasaba porque
# /__/auth/* son rutas reservadas suyas, ajenas a esta config. SAMEORIGIN sigue frenando el
# clickjacking desde terceros, que es lo que el header protege.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP en Report-Only: NO bloquea nada, solo reporta violaciones en la consola del
    # navegador. Es el paso previo a activarla, porque una CSP mal calibrada rompe la app
    # entera y acá no se puede probar sin producción: navegá el sitio (login con Google
    # incluido, que es lo más frágil), mirá si aparecen violaciones y recién ahí renombrá
    # este header a `Content-Security-Policy` para que empiece a aplicar.
    #
    # `frame-ancestors 'self'` por el mismo motivo que X-Frame-Options: SAMEORIGIN.
    # `script-src` sin 'unsafe-inline' porque el build no emite scripts inline (verificado
    # sobre dist/index.html); gstatic es el importScripts de Firebase en public/push-sw.js y
    # apis.google.com lo carga el handler de Auth, que al estar proxeado en /__/auth/ se
    # sirve con ESTA CSP (en Firebase Hosting eran rutas suyas y no la heredaban).
    # `style-src` sí necesita 'unsafe-inline': GSAP anima escribiendo estilos inline.
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; manifest-src 'self'; worker-src 'self'; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://apis.google.com; connect-src 'self' https://*.googleapis.com https://*.google.com https://*.gstatic.com"
